<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario HTML5 con IDs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }
        fieldset {
            margin-top: 20px;
            padding: 10px;
        }
        input, select, textarea {
            margin-top: 5px;
        }
    </style>
</head>
<body>

<h1>Formulario</h1>

<form>

    <fieldset>
        <legend>Texto y credenciales</legend>

        <label for="txtNombre">Text</label>
        <input id="txtNombre" type="text" required minlength="3">

        <label for="txtPassword">Password</label>
        <input id="txtPassword" type="password" required minlength="8">

        <label for="txtSearch">Search</label>
        <input id="txtSearch" type="search">

        <label for="txtEmail">Email</label>
        <input id="txtEmail" type="email" required>

        <label for="txtTel">Tel</label>
        <input id="txtTel" type="tel" pattern="[0-9]{9}" title="9 dígitos">

        <label for="txtUrl">URL</label>
        <input id="txtUrl" type="url">
    </fieldset>

    <fieldset>
        <legend>Números y rangos</legend>

        <label for="numEdad">Number</label>
        <input id="numEdad" type="date" min="0" max="100">

        <label for="rngNivel">Range</label>
        <input id="rngNivel" type="range" min="0" max="10">
    </fieldset>

    <fieldset>
        <legend>Fechas y tiempo</legend>

        <label for="dateFecha">Date</label>
        <input id="dateFecha" type="date">

        <label for="timeHora">Time</label>
        <input id="timeHora" type="time">

        <label for="dtLocal">Datetime-local</label>
        <input id="dtLocal" type="datetime-local">

        <label for="monthMes">Month</label>
        <input id="monthMes" type="month">

        <label for="weekSemana">Week</label>
        <input id="weekSemana" type="week">
    </fieldset>

    <fieldset>
        <legend>Selecciones</legend>

        <label>
            <input id="chkHtml" type="checkbox" name="skills[]" value="html">
            HTML
        </label>

        <label>
            <input id="chkCss" type="checkbox" name="skills[]" value="css">
            CSS
        </label>

        <label>
            <input id="chkJs" type="checkbox" name="skills[]" value="js">
            JavaScript
        </label>

        <label for="chkTerms">
            <input id="achkTerms" type="checkbox" required>
            Acepto términos
        </label>

        <label>
            <input id="radJunior" type="radio" name="nivel" required>
            Junior
        </label>

        <label>
            <input id="radSenior" type="radio" name="nivel">
            Senior
        </label>

        <label for="selOpcion">Select</label>
        <select id="selOpcion" required>
            <option value="">-- Selecciona --</option>
            <option>Opción 1</option>
            <option>Opción 2</option>
        </select>
    </fieldset>

    <fieldset>
        <legend>Otros inputs</legend>

        <label for="colorFav">Color</label>
        <input id="colorFav" type="color">

        <label for="fileDoc">File</label>
        <input id="fileDoc" type="file" accept=".pdf,.jpg">

        <input id="hiddenToken" type="hidden" value="dato_oculto">

        <label>Image</label>
        <input id="imgSubmit" type="image"
               src="https://unexx.es/80"
               alt="Enviar">
    </fieldset>

    <fieldset>
        <legend>Campos adicionales</legend>

        <label for="txtComentarios">Textarea</label>
        <textarea id="txtNombre"
                  minlength="10"
                  maxlength="200"
                  required></textarea>
    </fieldset>

    <fieldset>
        <legend>Botones</legend>

        <input id="btnSubmit" type="submit" value="Submit">
        <input id="btnReset" type="reset" value="Reset">
        <input id="btnNormal" type="button" value="Button">
    </fieldset>

</form>

</body>
</html>
