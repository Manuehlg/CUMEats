<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUMEats | Comida a domicilio</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<header class="header">
    <a href="inicio.html">
        <img src="../assets/logo.jpg" alt="CUMEats logo" class="logo">
    </a>

    <div class="brand-text">
        <p class="brand-title">CUMEats</p>
        <p class="brand-slogan">
            <span id="dynamic-slogan">Tu comida favorita, en casa</span>
        </p>
    </div>

    <nav class="nav-right">
        <a href="login.html" id="loginLink" class="login-btn">
            Iniciar sesión
        </a>
        <a href="registro.html" class="register-btn">
            Crear cuenta
        </a>
    </nav>
</header>

<section class="hero">
    <h1>Pide tu comida favorita a domicilio</h1>
    <p>Los mejores restaurantes cerca de ti</p>

    <div class="search-box">
        <div class="autocomplete-wrapper">
            <input type="search" id="hero-search" name="buscar"
                   placeholder="Introduce tu dirección o localidad" autocomplete="off">
            <button class="btn-primary" id="hero-search-btn">Buscar</button>
            <ul id="autocomplete-list" class="autocomplete-list" role="listbox" hidden></ul>
        </div>
    </div>
</section>

<section class="categories">
    <h2>Categorías populares</h2>

    <div class="category-grid">
        <a href="restaurantes.html?categoria=pizza" class="category">🍕 Pizza</a>
        <a href="restaurantes.html?categoria=burgers" class="category">🍔 Burgers</a>
        <a href="restaurantes.html?categoria=sushi" class="category">🍣 Sushi</a>
        <a href="restaurantes.html?categoria=mexicana" class="category">🌮 Mexicana</a>
    </div>
</section>

<footer class="footer">
    <p>© 2026 CUMEats · Proyecto universitario</p>
</footer>

<script src="../js/app.js"></script>
</body>
</html>
