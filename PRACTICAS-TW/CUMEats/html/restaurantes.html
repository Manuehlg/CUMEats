<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUMEats | Restaurantes</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<header class="header">
    <a href="inicio.html">
        <img src="../assets/logo.jpg" alt="CUMEats logo" class="logo">
    </a>

    <div class="brand-text">
        <p class="brand-title">CUMEats</p>
        <p class="brand-slogan">
            <span id="dynamic-slogan">Tu comida favorita, en casa</span>
        </p>
    </div>

    <nav class="nav-right">
        <a href="inicio.html">Inicio</a>
        <a href="login.html" id="loginLink" class="login-btn">
            Iniciar sesión
        </a>
        <a href="registro.html" class="register-btn">
            Crear cuenta
        </a>
    </nav>
</header>

<main class="restaurants-page">

    <aside class="filters">
        <h2 class="filters-title">Filtros</h2>

        <div class="filter-group">
            <label class="filter-label" for="search-input">🔍 Buscar por localidad o nombre</label>
            <input type="search" id="search-input" name="buscar" class="filter-search"
                   placeholder="Ej: Mérida, Pizza...">
        </div>

        <div class="filter-group">
            <p class="filter-label">🍽️ Categoría</p>
            <div class="filter-categories" role="group" aria-label="Filtrar por categoría">
                <button class="filter-cat active" data-cat="todas">Todas</button>
                <button class="filter-cat" data-cat="pizza">🍕 Pizza</button>
                <button class="filter-cat" data-cat="burgers">🍔 Burgers</button>
                <button class="filter-cat" data-cat="sushi">🍣 Sushi</button>
                <button class="filter-cat" data-cat="mexicana">🌮 Mexicana</button>
            </div>
        </div>

        <div class="filter-group">
            <label class="filter-label" for="price-range">💶 Precio máximo: <span id="price-display">30€</span></label>
            <input type="range" id="price-range" name="precio" min="5" max="30" value="30" step="1" class="filter-range">
            <div class="range-labels">
                <span>5€</span>
                <span>30€</span>
            </div>
        </div>

        <div class="filter-group">
            <p class="filter-label">⭐ Valoración mínima</p>
            <div class="filter-rating-btns" role="group" aria-label="Filtrar por valoración">
                <button class="filter-rating active" data-min="0">Todas</button>
                <button class="filter-rating" data-min="4">+4.0</button>
                <button class="filter-rating" data-min="4.5">+4.5</button>
            </div>
        </div>

        <div class="filter-group">
            <label class="filter-check" for="fast-delivery">
                <input type="checkbox" id="fast-delivery" name="entrega-rapida">
                <span>⚡ Entrega rápida (&lt;30 min)</span>
            </label>
        </div>

        <div class="filter-group">
            <label class="filter-check" for="bike-friendly">
                <input type="checkbox" id="bike-friendly" name="bike">
                <span>🚲 Bike friendly</span>
            </label>
        </div>

        <button id="clear-all-filters" class="btn-clear-all" type="button">Limpiar filtros</button>
    </aside>

    <section class="restaurants-wrapper">
        <div class="restaurants-header">
            <h1 id="category-title">Todos los restaurantes</h1>
            <span id="results-count" class="results-count" aria-live="polite"></span>
        </div>
        <div class="restaurants" id="restaurants-grid" role="list">
            <!-- Las cards se generan con JavaScript -->
        </div>
    </section>

</main>

<footer class="footer">
    <p>© 2026 CUMEats</p>
</footer>

<script src="../js/app.js"></script>

</body>
</html>
