<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Restaurante | CUMEats</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<header class="header">
    <a href="inicio.html">
        <img src="../assets/logo.jpg" class="logo" alt="CUMEats Logo">
    </a>
    <div class="brand-text">
        <p class="brand-title">CUMEats</p>
        <p class="brand-slogan"><span id="dynamic-slogan">Pide facil. Come mejor.</span></p>
    </div>
    <nav class="nav-right">
        <a href="inicio.html">Inicio</a>
        <a href="login.html" id="loginLink" class="login-btn">Iniciar sesión</a>
        <a href="registro.html" class="register-btn">Crear cuenta</a>
    </nav>
</header>

<main class="edit-page">

    <div class="edit-topbar">
        <button class="back-btn" id="back-btn" type="button">← Volver</button>
        <h1 class="edit-page-title">✏️ Editar restaurante</h1>
    </div>

    <form id="edit-form" class="edit-layout" novalidate>

        <section class="edit-card" aria-labelledby="section-info">
            <h2 id="section-info" class="edit-section-title">📋 Información general</h2>

            <div class="edit-grid">
                <div class="edit-field">
                    <label for="edit-name">Nombre del restaurante</label>
                    <input type="text" id="edit-name" name="nombre" placeholder="Nombre" required>
                    <span class="field-error" id="err-name" role="alert"></span>
                </div>

                <div class="edit-field">
                    <label for="edit-address">Dirección</label>
                    <input type="text" id="edit-address" name="direccion" placeholder="Calle, número, ciudad" required>
                    <span class="field-error" id="err-address" role="alert"></span>
                </div>

                <div class="edit-field">
                    <label for="edit-phone">Teléfono</label>
                    <input type="tel" id="edit-phone" name="telefono" placeholder="9XXXXXXXX" required>
                    <span class="field-error" id="err-phone" role="alert"></span>
                </div>

                <div class="edit-field">
                    <label for="edit-email">Email de contacto</label>
                    <input type="email" id="edit-email" name="email" placeholder="email@restaurante.com" required>
                    <span class="field-error" id="err-email" role="alert"></span>
                </div>

                <div class="edit-field">
                    <label for="edit-price">Precio mínimo de pedido (€)</label>
                    <input type="number" id="edit-price" name="precio" min="1" max="100" step="0.5" placeholder="10">
                    <span class="field-error" id="err-price" role="alert"></span>
                </div>

                <div class="edit-field">
                    <label for="edit-rating">Valoración (1 – 5)</label>
                    <input type="number" id="edit-rating" name="valoracion" min="1" max="5" step="0.1" placeholder="4.5">
                </div>

                <div class="edit-field">
                    <label for="edit-delivery">Tiempo de entrega</label>
                    <input type="text" id="edit-delivery" name="tiempoEntrega" placeholder="Ej: 20-30 min">
                </div>

                <div class="edit-field">
                    <label for="edit-category">Categoría principal</label>
                    <select id="edit-category" name="categoria">
                        <option value="pizza">🍕 Pizza</option>
                        <option value="burgers">🍔 Burgers</option>
                        <option value="sushi">🍣 Sushi</option>
                        <option value="mexicana">🌮 Mexicana</option>
                    </select>
                </div>
            </div>

            <div class="edit-field edit-field--full">
                <label for="tag-input">Etiquetas / subcategorías</label>
                <div class="tags-input-wrapper">
                    <div id="tags-container" class="tags-container"></div>
                    <input type="text" id="tag-input" name="etiqueta" class="tag-input"
                           placeholder="Escribe y pulsa Enter para añadir…">
                </div>
            </div>

            <div class="edit-field edit-field--full">
                <div class="toggle-label">
                    <span id="bike-label">🚲 Bike friendly</span>
                    <label class="toggle-switch" for="edit-bike" aria-labelledby="bike-label">
                        <input type="checkbox" id="edit-bike" name="bike">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
        </section>

        <section class="edit-card" aria-labelledby="section-menu">
            <h2 id="section-menu" class="edit-section-title">🍽️ Carta del restaurante</h2>

            <div class="add-dish-box">
                <h3>Añadir plato</h3>
                <div class="dish-form-grid">
                    <div class="edit-field">
                        <label for="dish-name">Nombre del plato</label>
                        <input type="text" id="dish-name" name="platoNombre" placeholder="Ej: Pizza Margherita">
                    </div>
                    <div class="edit-field">
                        <label for="dish-price">Precio (€)</label>
                        <input type="number" id="dish-price" name="platoPrecio" min="0" step="0.5" placeholder="8.50">
                    </div>
                    <div class="edit-field edit-field--full">
                        <label for="dish-desc">Descripción</label>
                        <input type="text" id="dish-desc" name="platoDesc" placeholder="Ingredientes o descripción breve">
                    </div>
                </div>
                <button type="button" id="add-dish-btn" class="btn-add-dish">＋ Añadir plato</button>
                <span class="field-error" id="err-dish" role="alert"></span>
            </div>

            <div id="dish-list" class="dish-list"></div>
            <p id="empty-menu-msg" class="empty-menu-msg">Aún no hay platos en la carta.</p>
        </section>

        <div class="edit-actions">
            <button type="button" id="cancel-btn" class="btn-cancel">Cancelar</button>
            <button type="submit" class="btn-save">💾 Guardar cambios</button>
        </div>

    </form>

    <div id="save-toast" class="save-toast" role="status">✅ Cambios guardados correctamente</div>

</main>

<footer class="footer">
    <p>© 2026 CUMEats</p>
</footer>

<script src="../js/app.js"></script>
</body>
</html>
