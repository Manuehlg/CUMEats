<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUMEats | Registro</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<header class="header">
    <a href="inicio.html">
        <img src="../assets/logo.jpg" alt="CUMEats logo" class="logo">
    </a>

    <div class="brand-text">
        <p class="brand-title">CUMEats</p>
        <p class="brand-slogan">
            <span id="dynamic-slogan">Tu comida favorita, en casa</span>
        </p>
    </div>

    <nav class="nav-right">
        <a href="inicio.html">Inicio</a>
        <a href="login.html" class="login-btn">Iniciar sesión</a>
    </nav>
</header>

<div class="login-container">
    <div class="login-content">

        <div class="brand-section">
            <p class="company-name">CUM<span>Eats</span></p>
        </div>

        <form class="form" id="registerForm" novalidate>

            <h1 class="form-title">Crear cuenta</h1>

            <div class="input-group">
                <label for="reg-name">Nombre</label>
                <input type="text" id="reg-name" name="nombre"
                       placeholder="Tu nombre" required autocomplete="given-name">
                <span class="form-error" id="err-reg-name" role="alert"></span>
            </div>

            <div class="input-group">
                <label for="reg-surname">Apellidos</label>
                <input type="text" id="reg-surname" name="apellidos"
                       placeholder="Tus apellidos" required autocomplete="family-name">
                <span class="form-error" id="err-reg-surname" role="alert"></span>
            </div>

            <div class="input-group">
                <label for="reg-phone">Teléfono</label>
                <input type="tel" id="reg-phone" name="telefono"
                       placeholder="6XX XXX XXX" required autocomplete="tel">
                <span class="form-error" id="err-reg-phone" role="alert"></span>
            </div>

            <div class="input-group">
                <label for="reg-email">Email</label>
                <input type="email" id="reg-email" name="email"
                       placeholder="correo@ejemplo.com" required autocomplete="email">
                <span class="form-error" id="err-reg-email" role="alert"></span>
            </div>

            <div class="input-group">
                <label for="reg-password">Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="reg-password" name="password"
                           placeholder="Mínimo 8 caracteres" required autocomplete="new-password">
                    <button type="button" class="toggle-password" data-target="reg-password"
                            aria-label="Mostrar u ocultar contraseña">👁</button>
                </div>
                <span class="form-error" id="err-reg-password" role="alert"></span>
            </div>

            <div class="input-group">
                <label for="reg-confirm">Confirmar contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="reg-confirm" name="confirm"
                           placeholder="Repite la contraseña" required autocomplete="new-password">
                    <button type="button" class="toggle-password" data-target="reg-confirm"
                            aria-label="Mostrar u ocultar contraseña">👁</button>
                </div>
                <span class="form-error" id="err-reg-confirm" role="alert"></span>
            </div>

            <button type="submit" class="submit-btn">Registrarse</button>

            <p class="form-switch">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>

        </form>

    </div>
</div>

<script src="../js/app.js"></script>

</body>
</html>
